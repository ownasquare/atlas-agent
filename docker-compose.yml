services:
  atlas:
    build:
      context: .
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ATLAS_MODEL: ${ATLAS_MODEL:-openai:gpt-4.1-mini}
      ATLAS_MEMORY_ENABLED: ${ATLAS_MEMORY_ENABLED:-true}
      ATLAS_CODE_EXECUTION_BACKEND: disabled
      ATLAS_REQUIRE_CODE_APPROVAL: "true"
      ATLAS_REQUIRE_OVERWRITE_APPROVAL: ${ATLAS_REQUIRE_OVERWRITE_APPROVAL:-true}
      ATLAS_MAX_AGENT_ITERATIONS: ${ATLAS_MAX_AGENT_ITERATIONS:-8}
      ATLAS_MAX_REVIEW_CYCLES: ${ATLAS_MAX_REVIEW_CYCLES:-2}
    volumes:
      - atlas-data:/app/.atlas/data
      - atlas-workspace:/app/.atlas/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  atlas-data:
  atlas-workspace:
